<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級核心價值互動工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .view-section {
            display: none;
        }
        .view-section.active {
            display: block;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-indigo-700 mb-2 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-700"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                班級核心價值：我們的約定
            </h1>
            <p class="text-slate-500">透過認識與互動，讓我們建立一個更溫暖、更有溫度的班級環境。</p>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex justify-center gap-2 mb-8 bg-white p-1 rounded-full shadow-sm border border-slate-200">
            <button id="tab-home" onclick="switchView('home')" class="tab-btn px-6 py-2 rounded-full transition-all bg-indigo-600 text-white shadow-md">
                認識價值
            </button>
            <button id="tab-vote" onclick="switchView('vote')" class="tab-btn px-6 py-2 rounded-full transition-all hover:bg-slate-100">
                心目中首選
            </button>
            <button id="tab-quiz" onclick="switchView('quiz')" class="tab-btn px-6 py-2 rounded-full transition-all hover:bg-slate-100">
                實踐挑戰
            </button>
        </div>

        <!-- Main Content Area -->
        <main class="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-slate-100 min-h-[400px]">
            
            <!-- View: Home -->
            <div id="view-home" class="view-section active animate-fadeIn">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                    什麼是我們的核心價值？
                </h2>
                <div id="core-values-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Core values will be injected here via JS -->
                </div>
                <div class="mt-10 text-center">
                    <button onclick="switchView('vote')" class="inline-flex items-center gap-2 bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors">
                        開始互動投票 
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </button>
                </div>
            </div>

            <!-- View: Vote -->
            <div id="view-vote" class="view-section animate-fadeIn">
                <h2 class="text-2xl font-bold mb-2 flex items-center gap-2 text-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                    心目中最希望班級做到的價值
                </h2>
                <p class="text-slate-500 mb-8">每人投下一票，看看班級共同最重視的是什麼？</p>
                
                <!-- Vote Options -->
                <div id="vote-options" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Vote buttons will be injected here -->
                </div>

                <!-- Vote Results (Hidden initially) -->
                <div id="vote-results" class="space-y-6 hidden">
                    <div class="bg-green-50 text-green-700 p-4 rounded-lg flex items-center gap-2 mb-6">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                        投票成功！看看大家的選擇：
                    </div>
                    <div id="vote-bars-container">
                        <!-- Progress bars will be injected here -->
                    </div>
                    <div class="pt-6 text-center">
                        <button onclick="switchView('quiz')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors">
                            進入挑戰：我會實踐它！
                        </button>
                    </div>
                </div>
            </div>

            <!-- View: Quiz -->
            <div id="view-quiz" class="view-section animate-fadeIn">
                <div class="flex justify-between items-center mb-6">
                    <span id="quiz-progress" class="text-sm font-bold text-indigo-600 uppercase tracking-wider">情境挑戰 1 / 3</span>
                    <span id="quiz-score-display" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-bold">目前分數: 0</span>
                </div>
                
                <h2 id="quiz-question" class="text-2xl font-bold text-slate-800 mb-8 leading-snug">
                    <!-- Question text -->
                </h2>

                <div id="quiz-options" class="space-y-4">
                    <!-- Quiz options will be injected here -->
                </div>

                <div id="quiz-feedback" class="mt-6 p-4 rounded-lg animate-bounce hidden">
                    <!-- Feedback will be injected here -->
                </div>
            </div>

            <!-- View: Results -->
            <div id="view-results" class="view-section text-center animate-fadeIn py-10">
                <div class="mb-6 inline-block p-6 bg-yellow-50 rounded-full border-4 border-yellow-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                </div>
                <h2 class="text-3xl font-bold mb-4 text-slate-800">挑戰完成！</h2>
                <p class="text-xl text-slate-600 mb-8">
                    你的「價值實踐力」得分：<span id="final-score" class="text-indigo-600 font-black text-4xl mx-2">0</span> / <span id="total-scenarios">0</span>
                </p>
                
                <div class="bg-indigo-50 p-6 rounded-2xl mb-8 max-w-md mx-auto">
                    <p class="italic text-indigo-800 leading-relaxed">
                        「最偉大的價值不是掛在牆上的口號，而是我們每天如何對待彼此。」
                    </p>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <button onclick="resetAll()" class="bg-slate-200 text-slate-700 px-8 py-3 rounded-xl font-semibold hover:bg-slate-300 transition-colors">
                        重新開始
                    </button>
                    <button onclick="switchView('home')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 shadow-lg transition-colors">
                        回到價值介紹
                    </button>
                </div>
            </div>

        </main>

        <!-- Footer -->
        <footer class="mt-8 text-center text-slate-400 text-sm">
            <p>© 2024 班級經營數位工具．讓價值落實於生活</p>
        </footer>
    </div>

    <script>
        // Data Configuration
        const CORE_VALUES = [
            {
                id: 'respect',
                title: '尊重',
                description: '看重他人的感受、權利與獨特性。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-pink-500"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>',
                color: 'bg-pink-50',
                borderColor: 'border-pink-200'
            },
            {
                id: 'responsibility',
                title: '負責',
                description: '認真完成自己的任務，並勇於承擔後果。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-blue-500"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1 6.5 1a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>',
                color: 'bg-blue-50',
                borderColor: 'border-blue-200'
            },
            {
                id: 'cooperation',
                title: '合作',
                description: '與他人攜手並進，為了共同目標努力。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-green-500"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
                color: 'bg-green-50',
                borderColor: 'border-green-200'
            },
            {
                id: 'integrity',
                title: '誠實',
                description: '說實話、做對的事，贏得他人的信任。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-yellow-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
                color: 'bg-yellow-50',
                borderColor: 'border-yellow-200'
            }
        ];

        const SCENARIOS = [
            {
                id: 1,
                value: 'respect',
                question: '當你在討論中與同學意見不同時，最好的實踐方式是？',
                options: [
                    { text: '大聲反駁，直到對方認輸', isCorrect: false, feedback: '這可能會傷害同學的感情。' },
                    { text: '耐心聽完對方的想法，再平和地表達自己的意見', isCorrect: true, feedback: '很好！這展現了對他人想法的尊重。' },
                    { text: '不說話，心裡默默討厭對方', isCorrect: false, feedback: '溝通才是解決差異的好方法。' }
                ]
            },
            {
                id: 2,
                value: 'responsibility',
                question: '分組作業時，如果你分配到的任務比較難，你會？',
                options: [
                    { text: '假裝忘記做，等其他同學幫忙完成', isCorrect: false, feedback: '這樣會增加組員的負擔喔。' },
                    { text: '直接放棄，說自己不會做', isCorrect: false, feedback: '嘗試努力或尋求建議也是負責的表現。' },
                    { text: '儘力嘗試，若遇到困難主動找老師或組長討論', isCorrect: true, feedback: '正確！積極面對困難是負責任的典範。' }
                ]
            },
            {
                id: 3,
                value: 'cooperation',
                question: '大掃除時，你發現自己負責的區域做完了，但旁邊的同學還在忙，你會？',
                options: [
                    { text: '主動詢問：「需要我幫忙嗎？」一起完成任務', isCorrect: true, feedback: '太棒了！團結力量大，這就是合作精神。' },
                    { text: '趕快收拾東西回座位休息', isCorrect: false, feedback: '班級環境需要大家共同維護。' },
                    { text: '站在旁邊看同學做，順便給他建議', isCorrect: false, feedback: '實際動手幫忙會比口頭建議更有力量。' }
                ]
            }
        ];

        // State variables
        let currentView = 'home';
        let votes = { respect: 0, responsibility: 0, cooperation: 0, integrity: 0 };
        let hasVoted = false;
        let quizIndex = 0;
        let score = 0;
        let isQuizAnswering = false;

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            renderCoreValues();
            renderVoteOptions();
            document.getElementById('total-scenarios').textContent = SCENARIOS.length;
        });

        // View Navigation Logic
        function switchView(viewName) {
            currentView = viewName;
            
            // Update tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn px-6 py-2 rounded-full transition-all hover:bg-slate-100";
            });
            const activeTabBtn = document.getElementById(`tab-${viewName === 'results' ? 'quiz' : viewName}`);
            if(activeTabBtn) {
                activeTabBtn.className = "tab-btn px-6 py-2 rounded-full transition-all bg-indigo-600 text-white shadow-md";
            }

            // Hide all sections and show target
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.remove('active');
                // Retrigger animation
                section.style.animation = 'none';
                section.offsetHeight; // trigger reflow
                section.style.animation = null; 
            });
            document.getElementById(`view-${viewName}`).classList.add('active');

            // Render view specific content
            if (viewName === 'quiz') renderQuiz();
            if (viewName === 'results') document.getElementById('final-score').textContent = score;
        }

        // Render Home View
        function renderCoreValues() {
            const container = document.getElementById('core-values-container');
            container.innerHTML = CORE_VALUES.map(val => `
                <div class="${val.color} border ${val.borderColor} p-6 rounded-xl transition-transform hover:scale-[1.02]">
                    <div class="flex items-center gap-3 mb-3">
                        ${val.iconSvg}
                        <h3 class="text-xl font-bold text-slate-800">${val.title}</h3>
                    </div>
                    <p class="text-slate-600 leading-relaxed">${val.description}</p>
                </div>
            `).join('');
        }

        // Render Vote View
        function renderVoteOptions() {
            const container = document.getElementById('vote-options');
            container.innerHTML = CORE_VALUES.map(val => `
                <button onclick="handleVote('${val.id}')" class="group flex flex-col items-center p-6 border-2 border-slate-100 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-center w-full">
                    <div class="mb-4 p-4 bg-white rounded-full shadow-sm group-hover:scale-110 transition-transform">
                        ${val.iconSvg}
                    </div>
                    <span class="text-lg font-bold text-slate-800">${val.title}</span>
                </button>
            `).join('');
        }

        function handleVote(id) {
            votes[id] += 1;
            hasVoted = true;
            document.getElementById('vote-options').classList.add('hidden');
            renderVoteResults();
            document.getElementById('vote-results').classList.remove('hidden');
        }

        function renderVoteResults() {
            const container = document.getElementById('vote-bars-container');
            const total = Object.values(votes).reduce((a, b) => a + b, 0);
            
            container.innerHTML = CORE_VALUES.map(val => {
                const percentage = total === 0 ? 0 : Math.round((votes[val.id] / total) * 100);
                return `
                    <div class="space-y-2 mb-4">
                        <div class="flex justify-between font-medium text-slate-700">
                            <span>${val.title}</span>
                            <span>${votes[val.id]} 票 (${percentage}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
                            <div class="bg-indigo-500 h-full transition-all duration-1000" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Render Quiz View
        function renderQuiz() {
            const scenario = SCENARIOS[quizIndex];
            document.getElementById('quiz-progress').textContent = `情境挑戰 ${quizIndex + 1} / ${SCENARIOS.length}`;
            document.getElementById('quiz-score-display').textContent = `目前分數: ${score}`;
            document.getElementById('quiz-question').textContent = scenario.question;
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = scenario.options.map((option, idx) => `
                <button onclick="handleQuizAnswer(${idx})" id="option-btn-${idx}" class="w-full text-left p-5 rounded-xl border-2 border-slate-100 hover:border-indigo-400 hover:bg-indigo-50 transition-all flex items-center justify-between group">
                    <span class="text-lg font-medium text-slate-700">${option.text}</span>
                    <span id="option-icon-${idx}"></span>
                </button>
            `).join('');

            const feedbackDiv = document.getElementById('quiz-feedback');
            feedbackDiv.classList.add('hidden');
            feedbackDiv.className = 'mt-6 p-4 rounded-lg animate-bounce hidden';
            
            isQuizAnswering = false;
        }

        function handleQuizAnswer(optionIdx) {
            if (isQuizAnswering) return;
            isQuizAnswering = true;

            const scenario = SCENARIOS[quizIndex];
            const option = scenario.options[optionIdx];
            const feedbackDiv = document.getElementById('quiz-feedback');
            const optionBtn = document.getElementById(`option-btn-${optionIdx}`);
            const optionIcon = document.getElementById(`option-icon-${optionIdx}`);

            // Styling buttons based on selection
            const allBtns = document.querySelectorAll('[id^="option-btn-"]');
            allBtns.forEach(btn => {
                btn.classList.remove('hover:border-indigo-400', 'hover:bg-indigo-50');
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            });

            if (option.isCorrect) {
                score += 1;
                document.getElementById('quiz-score-display').textContent = `目前分數: ${score}`;
                optionBtn.classList.remove('border-slate-100', 'opacity-50');
                optionBtn.classList.add('border-green-500', 'bg-green-50');
                optionIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-600"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`;
                
                feedbackDiv.classList.add('bg-green-100', 'text-green-800');
                feedbackDiv.innerHTML = `<strong>💡 答對了！</strong> ${option.feedback}`;
            } else {
                optionBtn.classList.remove('border-slate-100', 'opacity-50');
                optionBtn.classList.add('border-red-500', 'bg-red-50');
                
                feedbackDiv.classList.add('bg-orange-100', 'text-orange-800');
                feedbackDiv.innerHTML = `<strong>💡 小提醒：</strong> ${option.feedback}`;
            }

            feedbackDiv.classList.remove('hidden');

            // Move to next question or results
            setTimeout(() => {
                if (quizIndex < SCENARIOS.length - 1) {
                    quizIndex += 1;
                    renderQuiz();
                } else {
                    switchView('results');
                }
            }, 2000);
        }

        // Reset App
        function resetAll() {
            quizIndex = 0;
            score = 0;
            hasVoted = false;
            
            // Reset vote UI
            document.getElementById('vote-options').classList.remove('hidden');
            document.getElementById('vote-results').classList.add('hidden');
            
            switchView('home');
        }
    </script>
</body>
</html>
