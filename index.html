<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最溫暖的三甲英語課</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .view-section {
            display: none;
        }
        .view-section.active {
            display: block;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-indigo-700 mb-2 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-700"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
                最溫暖的三甲英語課
            </h1>
            <p class="text-slate-500">在三甲的英語課，我們一起學習、一起成長，落實這些美好的核心價值。</p>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex flex-wrap justify-center gap-2 mb-8 bg-white p-1 rounded-2xl md:rounded-full shadow-sm border border-slate-200 max-w-3xl mx-auto">
            <button id="tab-home" onclick="switchView('home')" class="tab-btn px-4 py-2 rounded-full transition-all bg-indigo-600 text-white shadow-md flex-1 min-w-[100px] text-sm md:text-base">
                認識價值
            </button>
            <button id="tab-practice" onclick="switchView('practice')" class="tab-btn px-4 py-2 rounded-full transition-all hover:bg-slate-100 flex-1 min-w-[100px] text-sm md:text-base">
                實踐指南
            </button>
            <button id="tab-vote" onclick="switchView('vote')" class="tab-btn px-4 py-2 rounded-full transition-all hover:bg-slate-100 flex-1 min-w-[100px] text-sm md:text-base">
                投票首選
            </button>
            <button id="tab-results" onclick="switchView('results')" class="tab-btn px-4 py-2 rounded-full transition-all hover:bg-slate-100 flex-1 min-w-[100px] text-sm md:text-base">
                投票結果
            </button>
        </div>

        <!-- Main Content Area -->
        <main class="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-slate-100 min-h-[400px]">
            
            <!-- View: Home (認識價值) -->
            <div id="view-home" class="view-section active animate-fadeIn">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                    三甲的核心價值
                </h2>
                <div id="core-values-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Core values will be injected here via JS -->
                </div>
                <div class="mt-10 text-center flex flex-wrap justify-center gap-4">
                    <button onclick="switchView('practice')" class="inline-flex items-center gap-2 bg-teal-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-teal-700 transition-colors">
                        查看實踐指南 
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </button>
                    <button onclick="switchView('vote')" class="inline-flex items-center gap-2 bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors">
                        進入票選區 
                    </button>
                </div>
            </div>

            <!-- View: Vote (心目中首選) -->
            <div id="view-vote" class="view-section animate-fadeIn">
                <h2 class="text-2xl font-bold mb-2 flex items-center gap-2 text-slate-800">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                    我們最想達成的目標
                </h2>
                <p class="text-slate-500 mb-4">每人最多可投 3 票，選出我們最想在英語課達成的價值是什麼？</p>
                <div id="vote-selection-status" class="text-center mb-6 font-bold text-indigo-600 text-lg hidden">請選擇 3 項 (目前已選: 0/3)</div>
                
                <!-- Vote Options -->
                <div id="vote-options" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <!-- Vote buttons will be injected here -->
                </div>

                <!-- Student Success Screen (Hidden initially) -->
                <div id="vote-success" class="space-y-6 hidden max-w-2xl mx-auto text-center py-10">
                    <div class="inline-block p-5 bg-green-100 text-green-600 rounded-full mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                    </div>
                    <h3 class="text-3xl font-bold text-slate-800">投票成功！</h3>
                    <p class="text-slate-600 text-lg">你的寶貴意見已經記錄下來囉。謝謝你的參與！</p>
                    <div class="pt-8 flex flex-wrap justify-center gap-4">
                        <button onclick="switchView('results')" class="bg-teal-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-teal-700 transition-colors shadow-md">
                            瀏覽投票結果
                        </button>
                    </div>
                </div>

                <!-- Already Voted Screen (Hidden initially) -->
                <div id="vote-already" class="space-y-6 hidden max-w-2xl mx-auto text-center py-10">
                    <div class="inline-block p-5 bg-indigo-100 text-indigo-600 rounded-full mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
                    </div>
                    <h3 class="text-3xl font-bold text-slate-800">你已經投過票囉！</h3>
                    <p class="text-slate-600 text-lg">每台平板只能投一次票。請前往觀看全班的即時結果。</p>
                    <div class="pt-8 flex flex-wrap justify-center gap-4">
                        <button onclick="switchView('results')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-md">
                            前往投票結果
                        </button>
                    </div>
                </div>
            </div>

            <!-- View: Results (投票結果) -->
            <div id="view-results" class="view-section animate-fadeIn">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold flex items-center gap-2 text-slate-800">
                        📊 班級投票結果
                    </h2>
                    <span id="results-voter-count" class="bg-indigo-100 text-indigo-800 px-4 py-1 rounded-full font-bold">
                        總投票人數: 0
                    </span>
                </div>
                
                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-8">
                    <div id="results-bars-container" class="space-y-6">
                        <!-- Progress bars will be injected here -->
                    </div>
                </div>

                <div class="text-center flex justify-center gap-4">
                    <button onclick="switchView('vote')" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-semibold hover:bg-indigo-700 transition-colors">
                        我要投票
                    </button>
                    <button onclick="clearAllVotes()" class="bg-slate-200 text-slate-700 px-6 py-2 rounded-xl font-semibold hover:bg-slate-300 transition-colors">
                        清除所有紀錄
                    </button>
                </div>
            </div>

            <!-- View: Practice (實踐指南) -->
            <div id="view-practice" class="view-section animate-fadeIn">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold mb-2 flex items-center justify-center gap-2 text-slate-800">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-teal-500"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                        生活與課堂的實踐指南
                    </h2>
                    <p class="text-slate-500">不只是口號，讓我們看看具體「怎麼說」與「怎麼做」。</p>
                </div>
                
                <div id="practice-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Practice cards will be injected here -->
                </div>
            </div>

        </main>

        <!-- Footer -->
        <footer class="mt-8 flex flex-col sm:flex-row justify-center items-center text-slate-400 text-sm gap-4">
            <p>© 2024 最溫暖的三甲英語課．讓價值落實於生活</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Data Configuration - Added Courage & Gratitude, and replaced Quiz with Examples
        const CORE_VALUES = [
            {
                id: 'respect',
                title: '尊重',
                description: '看重他人的感受，專心聆聽不打斷。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-pink-500"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>',
                color: 'bg-pink-50',
                borderColor: 'border-pink-200',
                headerBg: 'bg-pink-100',
                howToSay: '"Thank you for sharing." / "你的想法很棒，不過我有不同的看法..."',
                howToDo: '同學發表英文演說時，眼睛看著對方並專心聆聽；別人說話時不隨便插嘴。'
            },
            {
                id: 'responsibility',
                title: '負責',
                description: '為自己的學習負責，準備好上課所需。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-blue-500"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1 6.5 1a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>',
                color: 'bg-blue-50',
                borderColor: 'border-blue-200',
                headerBg: 'bg-blue-100',
                howToSay: '"I will do my homework." / "這是我該負責的部分，我會準時完成。"',
                howToDo: '上課鐘響前回到座位；確實帶齊英文課本與習作；主動完成老師交代的任務。'
            },
            {
                id: 'cooperation',
                title: '互助',
                description: '互相幫助完成共同目標。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-green-500"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
                color: 'bg-green-50',
                borderColor: 'border-green-200',
                headerBg: 'bg-green-100',
                howToSay: '"Let\'s do it together!" / "你需要幫忙嗎？我們一起找答案吧！"',
                howToDo: '小組討論時積極參與，不把工作都丟給別人；主動協助遇到困難的同學拼讀單字。'
            },
            {
                id: 'integrity',
                title: '誠實',
                description: '誠實面對學習，不懂就問，不欺騙。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-yellow-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
                color: 'bg-yellow-50',
                borderColor: 'border-yellow-200',
                headerBg: 'bg-yellow-100',
                howToSay: '"I made a mistake, sorry." / "老師，這個文法我聽不懂，可以再講一次嗎？"',
                howToDo: '考試不作弊；英文習作自己思考撰寫，不抄襲同學的答案；做錯事勇於承認。'
            },
            {
                id: 'courage',
                title: '勇敢',
                description: '勇於開口說英文，不怕犯錯。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-orange-500"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
                color: 'bg-orange-50',
                borderColor: 'border-orange-200',
                headerBg: 'bg-orange-100',
                howToSay: '"Can I try?" / "雖然我不確定發音對不對，但我願意試試看！"',
                howToDo: '上課遇到提問主動舉手發言；不怕發音不標準，勇敢且大聲地唸出英文句子。'
            },
            {
                id: 'gratitude',
                title: '感恩',
                description: '對身邊的人事物表達感謝與珍惜。',
                iconSvg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-teal-500"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>',
                color: 'bg-teal-50',
                borderColor: 'border-teal-200',
                headerBg: 'bg-teal-100',
                howToSay: '"Thank you for your help." / "謝謝老師的教導，謝謝同學借我橡皮擦。"',
                howToDo: '當同學或老師幫助你時，真誠地看著對方道謝；愛惜英語課本與教室的學習設備。'
            }
        ];

        // State variables
        let currentView = 'home';
        let votes = {};
        CORE_VALUES.forEach(val => votes[val.id] = 0);
        let hasVoted = false;
        let userSelectedVotes = []; 
        let totalVoters = 0;
        let currentUser = null;

        // Firebase Configuration setup
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const COLLECTION_NAME = 'class_values_votes';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Expose functions to window object for HTML onClick handlers
        window.switchView = switchView;
        window.toggleVoteSelection = toggleVoteSelection;
        window.submitVotes = submitVotes;
        window.clearAllVotes = clearAllVotes;

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            renderCoreValues();
            renderVoteOptions();
            renderPracticeGuide();

            // Setup Firebase Auth & Realtime listener
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    console.error("Auth error:", e);
                }
            };

            initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    setupRealtimeListener();
                }
            });
        });

        function setupRealtimeListener() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
            onSnapshot(colRef, (snapshot) => {
                // Reset local counts
                CORE_VALUES.forEach(val => votes[val.id] = 0);
                totalVoters = snapshot.docs.length;
                let dbHasVoted = false;

                snapshot.forEach(document => {
                    const data = document.data();
                    if (document.id === currentUser.uid) {
                        dbHasVoted = true;
                    }
                    if (data.selected && Array.isArray(data.selected)) {
                        data.selected.forEach(id => {
                            if (votes[id] !== undefined) votes[id]++;
                        });
                    }
                });

                // Sync local state with Database state
                if (!dbHasVoted && hasVoted) {
                    // Teacher cleared DB, reset student's state
                    hasVoted = false;
                    userSelectedVotes = [];
                    resetVoteUI();
                } else if (dbHasVoted && !hasVoted) {
                    // Student already voted on this device previously
                    hasVoted = true;
                    showAlreadyVotedScreen();
                }

                if (currentView === 'results') {
                    renderResults();
                }
            }, (error) => {
                console.error("Firestore error:", error);
            });
        }

        // View Navigation Logic
        function switchView(viewName) {
            currentView = viewName;
            
            if (viewName === 'results') {
                renderResults();
            }

            // Update tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn px-4 py-2 rounded-full transition-all hover:bg-slate-100 flex-1 min-w-[100px] text-sm md:text-base";
            });
            const activeTabBtn = document.getElementById(`tab-${viewName}`);
            if(activeTabBtn) {
                activeTabBtn.className = "tab-btn px-4 py-2 rounded-full transition-all bg-indigo-600 text-white shadow-md flex-1 min-w-[100px] text-sm md:text-base";
            }

            // Hide all sections and show target
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.remove('active');
                // Retrigger animation
                section.style.animation = 'none';
                section.offsetHeight; // trigger reflow
                section.style.animation = null; 
            });
            document.getElementById(`view-${viewName}`).classList.add('active');
        }

        // Render Home View
        function renderCoreValues() {
            const container = document.getElementById('core-values-container');
            container.innerHTML = CORE_VALUES.map(val => `
                <div class="${val.color} border ${val.borderColor} p-6 rounded-xl transition-transform hover:scale-[1.02] flex flex-col items-center text-center">
                    <div class="mb-3 p-3 bg-white rounded-full shadow-sm">
                        ${val.iconSvg}
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2">${val.title}</h3>
                    <p class="text-slate-600 text-sm leading-relaxed">${val.description}</p>
                </div>
            `).join('');
        }

        // Render Vote View
        function renderVoteOptions() {
            const statusDiv = document.getElementById('vote-selection-status');
            statusDiv.classList.remove('hidden');
            statusDiv.textContent = `請選擇 3 項 (目前已選: ${userSelectedVotes.length}/3)`;
            
            const container = document.getElementById('vote-options');
            container.innerHTML = CORE_VALUES.map(val => {
                const isSelected = userSelectedVotes.includes(val.id);
                const isMaxReached = userSelectedVotes.length >= 3;
                const isDisabled = !isSelected && isMaxReached;
                
                // 根據選取狀態設定樣式
                let buttonClasses = "group relative flex flex-col items-center p-5 border-2 rounded-2xl transition-all text-center w-full ";
                if (isSelected) {
                    buttonClasses += "border-indigo-500 bg-indigo-50 shadow-md ring-2 ring-indigo-200";
                } else if (isDisabled) {
                    buttonClasses += "border-slate-100 bg-slate-50 opacity-50 cursor-not-allowed";
                } else {
                    buttonClasses += "border-slate-100 bg-white hover:border-indigo-300 hover:bg-indigo-50";
                }

                return `
                <button onclick="toggleVoteSelection('${val.id}')" class="${buttonClasses}" ${isDisabled ? 'disabled' : ''}>
                    <div class="mb-3 p-3 ${isSelected ? 'bg-indigo-100' : 'bg-white'} rounded-full shadow-sm ${!isDisabled && !isSelected ? 'group-hover:scale-110' : ''} transition-transform flex-shrink-0">
                        ${val.iconSvg}
                    </div>
                    <span class="text-base md:text-lg font-bold text-slate-800">${val.title}</span>
                    <p class="text-xs text-slate-500 mt-2 leading-relaxed px-1">${val.description}</p>
                    ${isSelected ? '<div class="absolute top-3 right-3 text-indigo-600"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>' : ''}
                </button>
                `;
            }).join('') + `
                <div class="col-span-2 md:col-span-3 text-center mt-6">
                    <button onclick="submitVotes()" class="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg transition-all ${userSelectedVotes.length > 0 ? 'hover:bg-indigo-700 animate-pulse' : 'opacity-50 cursor-not-allowed'}" ${userSelectedVotes.length === 0 ? 'disabled' : ''}>
                        送出投票 (${userSelectedVotes.length}/3)
                    </button>
                </div>
            `;
        }

        function toggleVoteSelection(id) {
            if (userSelectedVotes.includes(id)) {
                userSelectedVotes = userSelectedVotes.filter(v => v !== id);
            } else {
                if (userSelectedVotes.length < 3) {
                    userSelectedVotes.push(id);
                }
            }
            renderVoteOptions(); 
        }

        async function submitVotes() {
            if (userSelectedVotes.length === 0 || !currentUser || hasVoted) return;
            
            hasVoted = true;
            document.getElementById('vote-options').classList.add('hidden');
            document.getElementById('vote-selection-status').classList.add('hidden');
            
            // 寫入 Firestore 雲端資料庫
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, currentUser.uid);
            try {
                await setDoc(docRef, { 
                    selected: userSelectedVotes,
                    timestamp: new Date().toISOString()
                });
                showSuccessScreen();
            } catch (error) {
                console.error("寫入資料庫失敗：", error);
                alert("網路連線異常，請稍後再試！");
                hasVoted = false; // 回復狀態
                resetVoteUI();
            }
        }

        function showSuccessScreen() {
            document.getElementById('vote-success').classList.remove('hidden');
            document.getElementById('vote-already').classList.add('hidden');
        }

        function showAlreadyVotedScreen() {
            document.getElementById('vote-options').classList.add('hidden');
            document.getElementById('vote-selection-status').classList.add('hidden');
            document.getElementById('vote-success').classList.add('hidden');
            document.getElementById('vote-already').classList.remove('hidden');
        }

        function resetVoteUI() {
            document.getElementById('vote-options').classList.remove('hidden');
            document.getElementById('vote-success').classList.add('hidden');
            document.getElementById('vote-already').classList.add('hidden');
            renderVoteOptions();
        }

        function renderResults() {
            document.getElementById('results-voter-count').textContent = `總投票人數: ${totalVoters}`;
            const container = document.getElementById('results-bars-container');
            
            // 依照票數排序
            const sortedValues = [...CORE_VALUES].sort((a, b) => votes[b.id] - votes[a.id]);

            container.innerHTML = sortedValues.map(val => {
                // 計算比例：獲得該票數的人數 / 總投票人數
                const percentage = totalVoters === 0 ? 0 : Math.round((votes[val.id] / totalVoters) * 100);
                return `
                    <div class="space-y-2">
                        <div class="flex justify-between font-bold text-slate-700 text-base md:text-lg">
                            <span class="flex items-center gap-2">${val.iconSvg.replace('w-7 h-7', 'w-5 h-5')} ${val.title}</span>
                            <span>${votes[val.id]} 票 <span class="text-indigo-500 text-sm">(${percentage}%)</span></span>
                        </div>
                        <div class="w-full bg-slate-200 h-4 md:h-5 rounded-full overflow-hidden shadow-inner">
                            <div class="bg-indigo-500 h-full transition-all duration-1000 relative" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function clearAllVotes() {
            if (!currentUser) return;
            if (confirm("確定要清除所有的投票紀錄嗎？這將無法復原！")) {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
                try {
                    const snapshot = await getDocs(colRef);
                    // 刪除所有使用者的投票紀錄
                    const deletePromises = snapshot.docs.map(d => deleteDoc(d.ref));
                    await Promise.all(deletePromises);
                    alert("已成功清除所有紀錄");
                } catch (error) {
                    console.error("清除資料庫失敗：", error);
                    alert("清除失敗，請檢查權限或連線狀態。");
                }
            }
        }

        // Render Practice Guide View (Replaced Quiz)
        function renderPracticeGuide() {
            const container = document.getElementById('practice-container');
            container.innerHTML = CORE_VALUES.map(val => `
                <div class="border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow bg-white flex flex-col">
                    <div class="${val.headerBg} p-4 flex items-center gap-3 border-b border-slate-200">
                        <div class="bg-white p-2 rounded-full shadow-sm">
                            ${val.iconSvg}
                        </div>
                        <h3 class="text-xl font-bold text-slate-800">${val.title}</h3>
                    </div>
                    <div class="p-5 flex-1 space-y-4">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <h4 class="text-sm font-bold text-slate-500 mb-2 flex items-center gap-1">
                                💬 怎麼說？ (How to say)
                            </h4>
                            <p class="text-slate-700 font-medium leading-relaxed">
                                ${val.howToSay}
                            </p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <h4 class="text-sm font-bold text-slate-500 mb-2 flex items-center gap-1">
                                🏃‍♂️ 怎麼做？ (How to do)
                            </h4>
                            <p class="text-slate-700 font-medium leading-relaxed">
                                ${val.howToDo}
                            </p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

    </script>
</body>
</html>
